apiVersion: apps/v1
kind: Deployment
metadata:
  name: epik8s-backend
  labels:
    app.kubernetes.io/name: epik8s-backend
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: epik8s-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: epik8s-backend
    spec:
      serviceAccountName: epik8s-backend
      containers:
        - name: backend
          image: epik8s-backend:latest  # Replace with your registry image
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: PORT
              value: "3001"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ARGOCD_URL
              valueFrom:
                configMapKeyRef:
                  name: epik8s-backend-config
                  key: argocd-url
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: epik8s-backend-secret
                  key: argocd-token
                  optional: true
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: epik8s-backend-config
                  key: allowed-origins
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"   # ArgoCD in-cluster uses self-signed certs
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
