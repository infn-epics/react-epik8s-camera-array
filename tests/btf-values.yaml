startIp: 1

iocDefaults:
  motor:
    asset: 'https://confluence.infn.it/x/nYD8DQ'
    autosync: false
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    devgroup: mot
    # devtype: tml
    # opi: tml/TML_Main.bob
    devtype: technosoft-asyn
    opi: "motor-asyn/Motor_Main.bob"
    template: motor
  ocem:
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    autosync: false
    devtype: E642
    devgroup: mag
    opi: "ocem/OCEM_unimag_v2.bob"
    idle_poll_s: 0.2
    active_poll_s: 0.1
    active_timeout_s: 10
    debug_level: 1
  adcamera:
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    devgroup: cam
    devtype: camera
    pva: true
    enable_ingress: true
    stream_enable: true
    service:
      http:
        enable: true
        port: 8082
  danfysik:
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    autosync: false
    devtype: sys8x00
    devgroup: mag
    opi: "danfysik/danfysik_sys8x00.bob"
  maccaferriPS:
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    autosync: false
    devtype: maccaferri
    devgroup: mag
    opi: "maccaferri/maccaferriPS.bob"
  psEEI:
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    autosync: false
    devtype: eei
    devgroup: mag
    opi: "eeips/eei_ps.bob"
  caenels:
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    autosync: false
    devgroup: mag

epicsConfiguration:
  name: "epics-configuration" # name of existing configMap that set CA parameters
  address_list: "193.206.82.124 192.168.189.190 192.168.189.198"
    
  max_array_bytes: "10000000"
  services:
    pvagateway:
      charturl: 'https://baltig.infn.it/epics-containers/ca-gateway-chart.git'
      
      ingress:
        enabled: false
      loadbalancer: 192.168.108.220
      template: "pvagateway"
      nodeSelector:
        lb-network-access: vlan-108
      replicaCount: 1
      exec: start.sh
      auto_security: true
      autosync: true ## restart automatically on changes
      staticIp: true
      resources:
            limits:
              cpu: 999m
              memory: 2Gi
            requests:
              cpu: 400m
              memory: 500Mi
      
    gateway:
      name: "cagateway"
      charturl: 'https://baltig.infn.it/epics-containers/ca-gateway-chart.git'
      ingress:
        enabled: false
      loadbalancer: 192.168.108.221
      
      template: "gateway"
      replicaCount: 1
      exec: start.sh
      auto_security: true
      autosync: true
      staticIp: true
      nodeSelector:
        lb-network-access: vlan-108

    archiver:
      name: "archiver"
      charturl: 'https://baltig.infn.it/epics-containers/epics-archiver-chart.git'
      desc: "EPICS Archiver Appliance for BTF"
      path: "/mgmt/ui/index.html"
      replicaCount: 1
      autosync: true
      serviceAccount:
        create: false
        name: "default"
      resources:
            limits:
              cpu: 999m
              memory: 5Gi
            requests:
              cpu: 100m
              memory: 4Gi
      storage:
        lts:
          path: /storage/lts
          size: 2000Gi
          claim: ""
          accessMode: ReadWriteOnce
          storageClassName: "archiver-lts"
        mts:
          path: /storage/mts
          size: 100Gi
          claim: ""
          accessMode: ReadWriteOnce
          storageClassName: "archiver-mts"

        sts:
          path: /storage/sts
          size: 10Gi
          claim: ""
          accessMode: ReadWriteOnce
        logs:
          path: /storage/logs
          size: 50Gi
          claim: ""
          accessMode: ReadWriteOnce
          storageClassName: "nfs20t"

      mysql:
            host: mysql
            dbname: arcappl
            user: arcappl
            pass: arcappl
      enable_ingress: true
      securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 1000
      disable: false ## dont deploy

    console: 
        name: "console"
        replicaCount: 1
        charturl: https://baltig.infn.it/epics-containers/epics-console-chart.git
        enable_ingress: true
        gitpath: opi
        gitRepoConfig:
          url: https://baltig.infn.it/lnf-da-control/epik8s-btf.git
          path: opi
          branch: k8sda
        autosync: true
    

    notebook: 
      name: "notebook"
      charturl: https://baltig.infn.it/epics-containers/jupyter-chart.git
      replicaCount: 1
      gitRepoConfig:
        url: https://baltig.infn.it/lnf-da-control/ecs-jupyter-control.git
        path: .
        branch: main
        init: true
      dataVolume:
          claim:  ## an existing claim or empty will create a new one
          size: 5Gi ## size of the claim
          accessMode: ReadWriteOnce
      auto_security: true
      enable_ingress: true
      autosync: false

    olog: 
      name: "olog"
      loglevel: DEBUG
      charturl: https://github.com/infn-epics/phoebus-services-chart.git
      phoebusservice: "olog"
      enable_ingress: true
      ingress:
        enabled: true
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      mongodb: "btf-ologAttachments"
      disable: false ##      
      targetRevision: "main"
      service:
        loglevel: "DEBUG"
      cors:
        origins: "https://btf-webolog.k8sda.lnf.infn.it"
      user: epics
      password: epics
      oauth2:
        enabled: true
        issueUri: "https://idp-test.app.infn.it/auth/realms/aai"
        claimsName: "name"
      ldap:
        enable: false  
        user:
          dn:
            pattern: "uid"
        url: "ldap://ds.infn.it"
        base:
          dn: "ou=People,dc=infn,dc=it"
    
    webolog:
      name: "webolog"
      image:
        repository: "ghcr.io/infn-epics/phoebus-olog-web-client-node-server"
        tag: "latest"
        pullPolicy: "Always"
      charturl: https://baltig.infn.it/epics-containers/generic-application-chart.git
      enable_ingress: true
      disable: false ##
      env:
        - name: VITE_APP_LEVEL_VALUES
          value: "[\"Urgent\",\"Suggestion\",\"Info\",\"Request\",\"Problem\"]"
        - name: VITE_APP_DEFAULT_LEVEL
          value: "Info"
        - name: VITE_APP_BASE_URL
          value: "https://btf-olog.k8sda.lnf.infn.it/Olog"
        - name: VITE_REACT_APP_USE_KEYCLOAK
          value: true
        - name: VITE_AUTH_CLIENT_ID
          value: camunda
        - name: VITE_AUTH_ENDPOINT
          value: "https://idp-test.app.infn.it/auth/realms/aai/protocol/openid-connect/auth"
        - name: VITE_AUTH_ENDPOINT_LOGOUT
          value: "https://idp-test.app.infn.it/auth/realms/aai/protocol/openid-connect/logout"
        - name: VITE_AUTH_ENDPOINT_TOKEN
          value: "https://idp-test.app.infn.it/auth/realms/aai/protocol/openid-connect/token"
        - name: VITE_AUTH_ENDPOINT_REDIRECT_URI
          value: "https://btf-webolog.k8sda.lnf.infn.it"
        - name: VITE_AUTH_SCOPE
          value: openid

      exec: |
        rm -rf .package-lock.json .env .env.production .env.local node_modules env* build
        echo "=== Creating .env.production file ==="
        cat > .env.production <<'ENVEOF'
        VITE_APP_BASE_URL=https://btf-olog.k8sda.lnf.infn.it/Olog
        VITE_APP_LOGBOOK_NAME=INFN BTF Logbook
        VITE_APP_AUTH_CLIENT_ID=camunda
        VITE_APP_AUTH_ENDPOINT=https://idp-test.app.infn.it/auth/realms/aai/protocol/openid-connect/auth
        VITE_APP_AUTH_ENDPOINT_LOGOUT=https://idp-test.app.infn.it/auth/realms/aai/protocol/openid-connect/logout
        VITE_APP_AUTH_ENDPOINT_TOKEN=https://idp-test.app.infn.it/auth/realms/aai/protocol/openid-connect/token
        VITE_APP_AUTH_ENDPOINT_REDIRECT_URI=https://btf-webolog.k8sda.lnf.infn.it
        VITE_APP_AUTH_SCOPE=openid
        VITE_APP_OAUTH2_ENABLED=true
        VITE_APP_LEVEL_VALUES=["Urgent","Suggestion","Info","Request","Problem"]
        VITE_APP_DEFAULT_LEVEL=Info
        VITE_APP_WEBSOCKET_BASE_URL=wss://btf-olog.k8sda.lnf.infn.it/Olog/web-socket
        ENVEOF
        echo "=== .env.production contents ==="
        cat .env.production
        npm ci
        npm run build
        echo "=== Verifying build (should NOT find localhost:3000) ==="
        grep -r "localhost:3000" build/ && echo "ERROR: localhost:3000 still in build!" || echo "OK: No localhost:3000 found"
        grep -r "btf-webolog" build/ | head -3
        serve -l 3000 -s build

      securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      service:
        ports:
          - name: webolog
            port: 80
            targetport: 3000
            targetname: webolog
            protocol: TCP

    saveandrestore: 
      name: "saveandrestore"
      loglevel: DEBUG
      charturl: https://github.com/infn-epics/phoebus-services-chart.git
      phoebusservice: "saveandrestore"
      targetRevision: "main"
      saveandrestore:
        image: "ghcr.io/infn-epics/phoebus/service-save-and-restore"

      enable_ingress: true
      mongodb: "btf-ologAttachments"
      disable: false ##
      usegateway: true
      oauth2:
        enabled: true
        issueUri: "https://idp-test.app.infn.it/auth/realms/aai"
        claimsName: "name"
    
    alarmserver: 
      name: "alarmserver"
      loglevel: DEBUG
      charturl: https://github.com/infn-epics/phoebus-services-chart.git
      phoebusservice: "alarmserver"
      enable_ingress: true
      mongodb: "btf-ologAttachments"
      disable: false ##
      targetRevision: "main"
      alarm:
        config: "btf-Accelerator"
      
      gitinit: true
      autosync: false ## restart automatically on changes
      usegateway: true


    # channelfinder: 
    #   name: "channelfinder"
    #   loglevel: DEBUG
    #   charturl: https://baltig.infn.it/epics-containers/channelfinder-chart.git
    #   enable_ingress: true
    #   mongodb: "btf-ologAttachments"
    #   disable: false ## 

    scanserver: 
      name: "scanserver"
      loglevel: DEBUG
      charturl: https://github.com/infn-epics/phoebus-services-chart.git
      phoebusservice: "scanserver"
      enable_ingress: true
      mongodb: "btf-ologAttachments"
      disable: true ## 

    pvws: 
      loglevel: DEBUG
      charturl: https://github.com/infn-epics/phoebus-services-chart.git
      phoebusservice: "pvws"
      enable_ingress: true
      env:
        - name: "PV_WRITE_SUPPORT"
          value: "true"
      autosync: false ## restart automatically on changes
      service:
        loglevel: "INFO"
      usegateway: true
    
    dbwr: 
      loglevel: DEBUG
      charturl: https://github.com/infn-epics/phoebus-services-chart.git
      phoebusservice: "dbwr"
      enable_ingress: true
      autosync: false ## restart automatically on changes
      service:
        loglevel: "INFO"
      usegateway: true
      gitRepoConfig:
          url: https://baltig.infn.it/lnf-da-control/btf-epics-opi.git
          path: .
      pvws:
        host: btf-pvws.k8sda.lnf.infn.it
        port: 80

    docs:
      name: "docs"
      image:
        repository: "nginx:alpine"
        pullPolicy: "Always"
      charturl: https://baltig.infn.it/epics-containers/generic-application-chart.git
      enable_ingress: true
      disable: false ##
      secure: true
      service:
        port: 80
      exec: {} ## default
      nfsMounts:
        - name: httpsrv-nfs
          mountPath: /usr/share/nginx/html
          server: 192.168.197.157
          path: /data_epik8s/btf/Documents/public
    mysql: 
      name: mysql
      charturl: registry-1.docker.io/bitnamicharts
