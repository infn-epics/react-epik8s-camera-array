# created automatically epik8s-gen (0.4.3) at 2024-11-11
beamline: euaps
namespace: euaps
epik8namespace: "k8sda.lnf.infn.it"
ingressClassName: "nginx"
targetRevision: main ## chart default revision
serviceAccountName: default
argocdProject: "euaps"
http_proxy: "http://squid.lnf.infn.it:3128"
https_proxy: "http://squid.lnf.infn.it:3128"
no_proxy: "localhost,127.0.0.1,::1,10.0.0.0/8,192.168.0.0/16,.svc,.svc.cluster.local,.lnf.infn.it"

## starting point
giturl: https://baltig.infn.it/lnf-da-control/epik8s-euaps.git
gitrev: devel
epik8s_secrets: epik8s-secret

baseIp: "10.43.248.0/22" ## valid service IPs are 10.43.248.1 to 10.43.251.254
startIp: 1 # 2
openshift: false

## iocDefaults: per-template defaults merged into each IOC.
## IOC-specific values always override these. 'template' key on each IOC is the lookup key.
iocDefaults:
  motor:
    pva: true
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    autosync: false
    devgroup: mot
    opi: "motor-asyn/Motor_Main.bob"
  adcamera:
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    devgroup: cam
    devtype: camera
    pva: true
    enable_ingress: true
    autosync: false
    resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
    service:
      http:
        enable: true
        port: 8082
    stream_enable: true
    iocprefix: "EUAPS:CAM"
    env:
        - name: "EPICS_CAS_INTF_ADDR_LIST"
          value: "0.0.0.0"   ## bind CA server on all interfaces (required when multus is present)
        - name: "EPICS_PVAS_INTF_ADDR_LIST"
          value: "0.0.0.0"   ## bind PVA server on all interfaces (required when multus is present)
    iocparam:
        - name: "overlay_enable"
          value: true
        - name: "stats_enable"
          value: true
        - name: "proc_enable"
          value: true
        - name: "tiff_enable"
          value: true
        - name: "roi_enable"
          value: true
        - name: "stdarray_enable"
          value: false
    

epicsConfiguration:
  name: "epics-configuration" # name of existing configMap that set CA parameters
  address_list: "" ## modulator
  max_array_bytes: "10000000"
  # conn_tmo: 120
  services:
    pvagateway:
      asset: "Gateway for PVA external connections"
      charturl: 'https://baltig.infn.it/epics-containers/ca-gateway-chart.git'
      template: "pvagateway"
      desc: "EPICS PVA Gateway "
      ingress:
        enabled: false
      loadbalancer: 192.168.108.230
      nodeSelector:
        lb-network-access: vlan-108
      replicaCount: 1
      auto_security: true
      autosync: true ## restart automatically on changes
      
      resources:
            limits:
              cpu: 999m
              memory: 2Gi
            requests:
              cpu: 400m
              memory: 500Mi
    gateway:
      asset: "Gateway for CA external connections"
      charturl: 'https://baltig.infn.it/epics-containers/ca-gateway-chart.git'
      template: "gateway"
      # image:
      #   tag: "v26.3.8b1"
      desc: "EPICS CA Gateway EPICS_CA_ADDR_LIST to access EUAPS IOCs"
      ingress:
        enabled: false
      loadbalancer: 192.168.108.231
      nodeSelector:
        lb-network-access: vlan-108
      replicaCount: 1
      auto_security: true
      params:
        # - name: "ignore_addr_list"
        #   value: "10.42.17.0"
        - name: "connect_timeout"
          value: 5
        - name: "inactive_timeout"
          value: 300
        - name: "dead_timeout"
          value: 60
        - name: "disconnect_timeout"
          value: 10
        - name: "reconnect_inhibit"
          value: 60
      autosync: true ## restart automatically on changes
      resources:
            limits:
              cpu: 999m
              memory: 2Gi
            requests:
              cpu: 400m
              memory: 1Gi
    archiver:
      asset: "Epics PV Archiver"
      charturl: 'https://baltig.infn.it/epics-containers/epics-archiver-chart.git'
      desc: "EPICS Archiver Appliance for EUAPS"
      path: "/mgmt/ui/index.html"
      replicaCount: 1
      serviceAccount:
        create: false
        name: default
      storage:
        lts:
          path: /storage/lts
          size: 10Gi
          claim: ""
          accessMode: ReadWriteOnce
        mts:
          path: /storage/mts
          size: 10Gi
          claim: ""
          accessMode: ReadWriteOnce
        sts:
          path: /storage/sts
          size: 5Gi
          claim: ""
          accessMode: ReadWriteOnce
        logs:
          path: /storage/logs
          size: 5Gi
          claim: ""
          accessMode: ReadWriteOnce
      mysql:
            host: mysql
            dbname: arcappl
            user: arcappl
            pass: arcappl
      enable_ingress: true
      securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 1000
      resources:
            limits:
              cpu: 999m
              memory: 6Gi
            requests:
              cpu: 100m
              memory: 4Gi
      autosync: true ## restart automatically on changes
      usegateway: true
    console:
        asset: "Ubuntu WEB Console running Phoebus"
        replicaCount: 1
        charturl: https://baltig.infn.it/epics-containers/epics-console-chart.git
        enable_ingress: true
        gitpath: opi
        resources:
            limits:
              cpu: 2000m
              memory: 4Gi
            requests:
              cpu: 1000m
              memory: 1Gi
        gitRepoConfig:
          url: https://baltig.infn.it/lnf-da-control/epik8s-euaps.git
          path: opi
          branch: devel
        autosync: false ## restart automatically on changes
        usegateway: true
    notebook:
      asset: "Jupyther notebook enabled to access EPIK8s resources"
      charturl: 'https://baltig.infn.it/epics-containers/jupyter-control-notebook-chart.git'
      replicaCount: 1
      gitRepoConfig:
        url: https://baltig.infn.it/lnf-da-control/ecs-jupyter-control.git
        path: .
        branch: main
        init: true
      dataVolume:
          claim:  ## an existing claim or empty will create a new one
          size: 1Gi ## size of the claim
          accessMode: ReadWriteOnce
      enable_ingress: true
      usegateway: true
      autosync: false ## restart automatically on changes
      pip:
        - bluesky
        - infn-ophyd-hal
    pvws:
      asset: "Phoebus WEB (experimental)"
      loglevel: DEBUG
      charturl: https://github.com/infn-epics/phoebus-services-chart.git
      phoebusservice: "pvws"
      auto_security: true
      enable_ingress: true
      autosync: false ## restart automatically on changes
      env:
        - name: "PV_WRITE_SUPPORT"
          value: "true"
      service:
        loglevel: "INFO"
      usegateway: true
    dbwr:
      asset: "PV REST server (experimental)"
      loglevel: DEBUG
      charturl: https://github.com/infn-epics/phoebus-services-chart.git
      phoebusservice: "dbwr"
      auto_security: true
      enable_ingress: true
      autosync: false ## restart automatically on changes
      service:
        loglevel: "INFO"
      usegateway: true
      gitRepoConfig:
          url: https://baltig.infn.it/lnf-da-control/sparc-epics-opi.git
          path: .
      pvws:
        host: euaps-pvws.k8sda.lnf.infn.it
        port: 80
    

   ## olog, scanserver,channelfinder, saverestore
    ## require backend activated
    mysql: 
      asset: "Mysql(bitnami) Service primarly used for Epics Archiver"
      name: mysql
      charturl: registry-1.docker.io/bitnamicharts
      targetRevision: '9.21.1'
      chart: mysql
      image:
        repository: bitnamilegacy/mysql
      auth:
          rootPassword: "arcappl"
          createDatabase: true
          database: "arcappl"
          username: "arcappl"
          password: "arcappl"
      primary:
        persistence:
          storageClass: nfs20t
          size: 10Gi
      serviceAccount:
        create: false
        name: "default"

    
    camarray:
      name: "camarray"
      asset: "EPIK8s Camera Array - NxM grid of EPICS camera streams"
      image:
        repository: "ghcr.io/infn-epics/phoebus-olog-web-client-node-server"
        tag: "latest"
        pullPolicy: "Always"
      charturl: https://baltig.infn.it/epics-containers/generic-application-chart.git
      enable_ingress: true
      disable: false
      autosync: false
      service:
        port: 3000
      gitRepoConfig:
        url: https://github.com/infn-epics/react-epik8s-camera-array.git
        path: .
        branch: epik8s-react
        init: true
      pvws:
        host: euaps-pvws-http.k8sda.lnf.infn.it
        port: 80
      exec: |
        cd /config
        echo "=== Building react-epik8s-camera-array ==="
        cp /etc/epik8s-beamline.yaml public/values.yaml
        npm ci
        npm run build
        echo "=== Serving camera array ==="
        serve -l 3000 -s dist

    docs:
      name: "docs"
      image:
        repository: "nginx:alpine"
        pullPolicy: "Always"
      charturl: https://baltig.infn.it/epics-containers/generic-application-chart.git
      enable_ingress: true
      disable: false ##
      secure: true
      service:
        port: 80
      exec: {} ## default
      nfsMounts:
        - name: httpsrv-nfs
          mountPath: /usr/share/nginx/html
          server: 192.168.197.157
          path: /data_epik8s/euaps/Documents/public
    
    
    
